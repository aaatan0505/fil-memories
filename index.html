<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fil Memories</title>

<style>
body{
  margin:0;
  font-family: serif;
  background:#f5efe6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.book{
  background:white;
  padding:60px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
  max-width:500px;
}

h1{
  font-size:42px;
  margin-bottom:10px;
  color:#7b6a58;
}

p{
  color:#8d7d6b;
  margin-bottom:30px;
}

button{
  background:#b89b7a;
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:999px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="book">
<h1>📖 fil Memories</h1>

<p>
思い出の絵本へようこそ
</p>

<button>
絵本をひらく
</button>

</div>

</body>
</html>
