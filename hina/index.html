<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina | fil Memories</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f4efe7;
  color:#5f554b;
  font-family: Georgia, "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
}

.wrap{
  min-height:100vh;
  padding:34px 20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.book{
  width:100%;
  max-width:430px;
  background:#fffdf9;
  border-radius:2px;
  padding:58px 28px 42px;
  box-shadow:0 22px 60px rgba(96,78,58,.10);
  text-align:center;
  border:1px solid rgba(150,130,105,.18);
}

.brand{
  font-size:13px;
  letter-spacing:.28em;
  text-transform:uppercase;
  margin-bottom:70px;
  color:#9a8c7b;
}

.title{
  font-size:56px;
  line-height:.95;
  font-weight:400;
  margin:0;
  color:#706458;
}

.subtitle{
  margin-top:22px;
  font-size:14px;
  letter-spacing:.22em;
  color:#9a8c7b;
}

.date{
  margin-top:90px;
  font-size:13px;
  letter-spacing:.18em;
  color:#9a8c7b;
}

.line{
  width:1px;
  height:60px;
  background:#cfc3b4;
  margin:38px auto;
}

.note{
  font-size:14px;
  line-height:2;
  color:#7b6f63;
  margin-bottom:28px;
}

input{
  width:100%;
  max-width:270px;
  border:none;
  border-bottom:1px solid #c9bba8;
  background:transparent;
  padding:13px 8px;
  text-align:center;
  font-size:16px;
  color:#5f554b;
  outline:none;
}

input::placeholder{
  color:#b5a899;
}

button{
  margin-top:28px;
  border:1px solid #a9957d;
  background:transparent;
  color:#7b6a58;
  padding:14px 34px;
  border-radius:999px;
  font-size:14px;
  letter-spacing:.12em;
  cursor:pointer;
}

button:hover{
  background:#a9957d;
  color:#fffdf9;
}

#gallery{
  display:none;
  margin-top:50px;
  padding-top:38px;
  border-top:1px solid #e3d9cc;
}

.gallery-title{
  font-size:28px;
  font-weight:400;
  margin:0 0 12px;
}

.gallery-text{
  font-size:14px;
  line-height:2;
  color:#7b6f63;
}

@media(max-width:480px){
  .book{
    padding:52px 24px 38px;
  }

  .title{
    font-size:48px;
  }

  .brand{
    margin-bottom:60px;
  }

  .date{
    margin-top:78px;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <div class="book">

    <div class="brand">fil memories</div>

    <h1 class="title">Hina</h1>

    <div class="subtitle">FIRST BIRTHDAY</div>

    <div class="date">2026.06.05</div>

    <div class="line"></div>

    <p class="note">
      思い出の絵本をひらくために<br>
      合言葉を入力してください
    </p>

    <input id="pw" placeholder="password">

    <br>

    <button onclick="checkPassword()">OPEN BOOK</button>

    <div id="gallery">
      <h2 class="gallery-title">Dear Hina</h2>
      <p class="gallery-text">
        ようこそ、ひなちゃんの絵本へ。<br>
        この日の小さな物語を<br>
        ゆっくりめくってください。
      </p>
    </div>

  </div>
</div>

<script>
function checkPassword(){
  const password = document.getElementById("pw").value;

  if(password === "hina"){
    document.getElementById("gallery").style.display = "block";
  }else{
    alert("合言葉が違います");
  }
}
</script>

</body>
</html>
