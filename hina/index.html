<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hina Memories</title>

<style>
body{
  margin:0;
  background:#f5efe6;
  font-family:serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:50px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  color:#7b6a58;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  width:220px;
}

button{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:999px;
  background:#b89b7a;
  color:white;
}

#gallery{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>📖 Hina Memories</h1>

<p>合言葉を入力してください</p>

<input id="pw" placeholder="合言葉">

<br>

<button onclick="checkPassword()">
絵本をひらく
</button>

<div id="gallery">
<h2>ようこそ ひなちゃん🤎</h2>
<p>専用ギャラリーへようこそ</p>
</div>

</div>

<script>
function checkPassword(){

const password =
document.getElementById("pw").value;

if(password === "hina"){
document.getElementById("gallery").style.display="block";
}else{
alert("合言葉が違います");
}

}
</script>

</body>
</html>
