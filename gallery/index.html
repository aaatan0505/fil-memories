<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fil memories gallery</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+JP:wght@200;300&display=swap');

*{box-sizing:border-box;}

body{
  margin:0;
  background:#f8f5f1;
  color:#756f68;
  font-family:"Noto Serif JP",serif;
}

section{
  padding:72px 24px;
  text-align:center;
}

.brand{
  font-family:"Cormorant Garamond",serif;
  font-size:22px;
  letter-spacing:.28em;
  font-weight:300;
  margin-bottom:74px;
}

.name{
  font-family:"Cormorant Garamond",serif;
  font-size:50px;
  font-weight:300;
  letter-spacing:.08em;
  margin-bottom:28px;
}

.line{
  width:70px;
  height:1px;
  background:#d8cec5;
  margin:38px auto;
}

.subtitle{
  font-size:13px;
  letter-spacing:.22em;
  line-height:2.5;
  color:#8a837b;
}

input{
  width:190px;
  border:none;
  border-bottom:1px solid #c8bba9;
  background:transparent;
  text-align:center;
  padding:12px;
  font-size:15px;
  letter-spacing:.18em;
  color:#756f68;
  outline:none;
}

button,.download{
  margin-top:28px;
  border:1px solid #cfc3b7;
  background:#d8cec5;
  color:white;
  border-radius:999px;
  padding:13px 42px;
  font-family:"Cormorant Garamond",serif;
  font-size:17px;
  letter-spacing:.18em;
  text-decoration:none;
  display:inline-block;
  cursor:pointer;
}

#album{
  display:none;
}

.album-title{
  font-family:"Cormorant Garamond",serif;
  font-size:42px;
  font-weight:300;
  letter-spacing:.06em;
  margin-bottom:24px;
}

.info{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:22px auto 24px;
}

.info span{
  border:1px solid #e0d8cf;
  border-radius:999px;
  padding:9px 18px;
  font-size:12px;
  letter-spacing:.12em;
  color:#8a837b;
  background:#fffdf9;
}

.info .share{
  cursor:pointer;
}

.message{
  margin:20px auto 20px;
  font-size:10px;
  letter-spacing:.18em;
  line-height:1.8;
  color:#b0a79d;
}

.gallery{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:48px;
}

.gallery img{
  width:100%;
  aspect-ratio:1/1.25;
  object-fit:cover;
  border-radius:4px;
  background:#ebe4da;
  cursor:pointer;
}

.footer{
  padding:90px 24px;
}

.thanks{
  font-family:"Cormorant Garamond",serif;
  font-size:30px;
  letter-spacing:.12em;
  font-weight:300;
}

.small{
  font-size:11px;
  letter-spacing:.16em;
  color:#aaa39a;
  margin-top:18px;
}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(35,30,26,.86);
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.lightbox img{
  max-width:100%;
  max-height:86vh;
  object-fit:contain;
}

.close{
  position:absolute;
  top:20px;
  right:24px;
  color:white;
  font-size:32px;
  font-family:serif;
  cursor:pointer;
}

@media(min-width:700px){
  .gallery{
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:480px){
  section{padding:70px 22px;}
  .name{font-size:46px;}
  .album-title{font-size:38px;}
}
</style>
</head>

<body>

<section id="cover">
  <div class="brand">fil memories</div>

  <div class="name" id="childNameCover"></div>

  <div class="line"></div>

  <div class="subtitle">
    お写真の準備ができました。<br>
    合言葉を入力してアルバムをご覧ください。
  </div>

  <br><br>

  <input id="pw" placeholder="password">
  <br>
  <button onclick="openAlbum()">open album</button>
</section>

<div id="album">

<section>
  <div class="brand">fil memories</div>

  <div class="album-title">
    <span id="childNameAlbum"></span> 様のアルバム
  </div>

  <div class="info">
    <span id="expireDate"></span>
    <span class="share" onclick="copyUrl()">シェアURL</span>
  </div>

  <div class="message">
    a collection of precious moments
  </div>

  <a class="download" href="../photos/download.zip" download>
    Download all
  </a>

  <div class="gallery">
    <img src="../photos/DSC04304-1.jpg" onclick="openLightbox(this.src)">
    <img src="../photos/DSC04305-2.jpg" onclick="openLightbox(this.src)">
    <img src="../photos/DSC04306-3.jpg" onclick="openLightbox(this.src)">
    <img src="../photos/DSC04309-4.jpg" onclick="openLightbox(this.src)">
    <img src="../photos/DSC04314-5.jpg" onclick="openLightbox(this.src)">
    <img src="../photos/DSC04320-6.jpg" onclick="openLightbox(this.src)">
  </div>
</section>

<section class="footer">
  <div class="thanks">thank you</div>
  <div class="small">© fil memories. all rights reserved.</div>
</section>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="close">×</div>
  <img id="lightboxImg">
</div>

<script>
/* ここだけ毎回変更 */
const childName = "Hina";
const password = "hina";
const expireDate = "公開期限：2026/10/9 まで";

/* 表示 */
document.getElementById("childNameCover").innerHTML = childName;
document.getElementById("childNameAlbum").innerHTML = childName;
document.getElementById("expireDate").innerHTML = expireDate;

function openAlbum(){
  const input = document.getElementById("pw").value;

  if(input === password){
    document.getElementById("album").style.display = "block";
    document.getElementById("album").scrollIntoView({behavior:"smooth"});
  }else{
    alert("合言葉が違います");
  }
}

function copyUrl(){
  navigator.clipboard.writeText(window.location.href);
  alert("URLをコピーしました");
}

function openLightbox(src){
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
